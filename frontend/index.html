<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/eventtix-logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventTix</title>
  <script>
    // Apply theme immediately to prevent flash
    (function () {
      const theme = localStorage.getItem('theme');
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const shouldBeDark = theme === 'dark' || (!theme && systemPrefersDark);

      if (shouldBeDark) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <style>
    /* Prevent white flash with theme-aware background */
    html {
      background-color: #f9fafb;
      color: #111827;
    }

    html.dark {
      background-color: #111827;
      color: #f3f4f6;
    }
  </style>
</head>

<body
  class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-200 antialiased">
  <div id="root" class="min-h-screen flex flex-col"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
