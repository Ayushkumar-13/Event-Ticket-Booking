<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="tixGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eaefff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-2" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Massive circular background ensuring GitHub/ChatGPT identical sizing -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)" />

  <!-- Gorgeous Ticket Icon -->
  <g transform="rotate(-15 100 100)" filter="url(#glow)">
    <!-- Base Ticket -->
    <path d="M 40,60 L 160,60 
             A 15,15 0 0,1 175,75 
             L 175,90 
             A 15,15 0 0,0 175,120 
             L 175,135 
             A 15,15 0 0,1 160,150 
             L 40,150 
             A 15,15 0 0,1 25,135 
             L 25,120 
             A 15,15 0 0,0 25,90 
             L 25,75 
             A 15,15 0 0,1 40,60 Z" 
          fill="url(#tixGrad)" />
          
    <!-- Inner dashed border -->
    <path d="M 45,68 L 155,68 L 155,142 L 45,142 Z" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
    
    <!-- Ticket Tear Line -->
    <path d="M 125,65 L 125,145" stroke="#6366f1" stroke-width="3" stroke-dasharray="4,6" opacity="0.4"/>
    
    <!-- E logo inside ticket -->
    <text x="75" y="116" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-weight="900" font-style="italic" font-size="44" fill="#4f46e5" text-anchor="middle">E</text>
    
    <!-- Tix text inside ticket -->
    <text x="75" y="132" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-weight="800" font-size="14" fill="#7c3aed" text-anchor="middle" letter-spacing="2">TIX</text>
  </g>
</svg>
